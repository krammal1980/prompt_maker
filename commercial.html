<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Revit Commercial Building — Prompt Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=IBM+Plex+Mono:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ══════════════════════════════════════
   TOKENS
══════════════════════════════════════ */
:root {
  --bg:          #EDF1F6;
  --bg2:         #E0E7F0;
  --surface:     #FFFFFF;
  --surface2:    #E7EEF6;
  --border:      #C9D6E3;
  --border2:     #AEC1D4;
  --text:        #14202C;
  --text-mid:    #3D5468;
  --text-dim:    #7A90A6;
  --accent:      #2F5E8C;
  --accent-light:#4A86C0;
  --accent-dim:  rgba(47,94,140,0.09);
  --accent-glow: rgba(47,94,140,0.18);
  --ok:          #2F5E8C;
  --radius:      8px;
  --radius-lg:   14px;
  --card-w:      136px;
  --card-img-h:  90px;
  --transition:  0.2s cubic-bezier(0.4,0,0.2,1);
}

/* ══════════════════════════════════════
   RESET + BASE
══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 400;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.site-header {
  background: #16222E;
  color: var(--bg);
  padding: 0 40px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-left {
  display: flex;
  align-items: baseline;
  gap: 16px;
}
.header-logo {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 22px;
  font-weight: 300;
  letter-spacing: 0.01em;
  color: #fff;
  line-height: 1;
}
.header-logo span { color: var(--accent-light); }
.header-sep {
  width: 1px;
  height: 16px;
  background: rgba(255,255,255,0.18);
}
.header-tag {
  font-size: 9px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  font-family: 'IBM Plex Mono', monospace;
  font-weight: 400;
}
.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-pill {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.5);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 20px;
  font-family: 'Space Grotesk', sans-serif;
}
.header-sel-count {
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  padding: 4px 12px;
  border-radius: 20px;
  font-family: 'Space Grotesk', sans-serif;
  min-width: 30px;
  text-align: center;
  transition: var(--transition);
}
.header-nav {
  display: flex;
  align-items: center;
  gap: 2px;
}
.header-nav a {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  text-decoration: none;
  padding: 6px 14px;
  border-radius: 20px;
  transition: all var(--transition);
}
.header-nav a:hover { color: #fff; background: rgba(255,255,255,0.08); }
.header-nav a.active { color: #fff; background: var(--accent); }
@media (max-width: 720px) { .header-nav { display: none; } }

/* ══════════════════════════════════════
   MAIN LAYOUT
══════════════════════════════════════ */
.main-layout {
  display: grid;
  grid-template-columns: 1fr 400px;
  flex: 1;
  overflow: hidden;
  height: calc(100vh - 58px);
}

/* ══════════════════════════════════════
   LEFT PANEL — WIZARD
══════════════════════════════════════ */
.wizard-panel {
  overflow-y: auto;
  padding: 32px 40px 80px;
  height: 100%;
}
.wizard-panel::-webkit-scrollbar { width: 4px; }
.wizard-panel::-webkit-scrollbar-track { background: transparent; }
.wizard-panel::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

/* progress bar */
.progress-bar-wrap {
  margin-bottom: 32px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.progress-bar-track {
  flex: 1;
  height: 2px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
  width: 0%;
}
.progress-label {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  white-space: nowrap;
  min-width: 60px;
  text-align: right;
}

/* ══════════════════════════════════════
   ACCORDION STEP
══════════════════════════════════════ */
.step {
  margin-bottom: 6px;
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  background: var(--surface);
  overflow: hidden;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.step.has-selection {
  border-color: var(--accent);
}
.step.open {
  border-color: var(--border2);
  box-shadow: 0 4px 24px rgba(26,23,20,0.06);
}
.step.open.has-selection {
  border-color: var(--accent);
  box-shadow: 0 4px 24px var(--accent-glow);
}

.step-header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background var(--transition);
}
.step-header:hover { background: var(--surface2); }

.step-num {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 1.5px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  flex-shrink: 0;
  transition: all var(--transition);
}
.step.has-selection .step-num {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}
.step-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 17px;
  font-weight: 400;
  color: var(--text);
  flex: 1;
  line-height: 1.2;
  letter-spacing: 0.01em;
}
.step-subtitle {
  font-size: 9.5px;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  margin-top: 2px;
  font-family: 'IBM Plex Mono', monospace;
}
.step-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 20px;
  letter-spacing: 0.06em;
  flex-shrink: 0;
  transition: all var(--transition);
}
.step-badge.empty {
  background: var(--bg2);
  color: var(--text-dim);
}
.step-badge.filled {
  background: var(--accent-dim);
  color: var(--accent);
}
.step-chevron {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  color: var(--text-dim);
  transition: transform var(--transition);
}
.step.open .step-chevron { transform: rotate(180deg); }

.step-body {
  display: none;
  padding: 4px 20px 20px;
  border-top: 1px solid var(--border);
}
.step.open .step-body { display: block; }

.step-hint {
  font-size: 11px;
  color: var(--text-dim);
  letter-spacing: 0.04em;
  margin-bottom: 14px;
  margin-top: 10px;
}

/* ══════════════════════════════════════
   MATERIAL CARDS
══════════════════════════════════════ */
.cards-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.mat-card {
  width: var(--card-w);
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: border-color var(--transition), transform var(--transition), box-shadow var(--transition);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  flex-shrink: 0;
  position: relative;
}
.mat-card:hover {
  border-color: var(--accent-light);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(26,23,20,0.1);
}
.mat-card.selected {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px var(--accent-glow), 0 6px 20px rgba(26,23,20,0.1);
  transform: translateY(-2px);
}
.mat-card .card-img-wrap {
  position: relative;
  width: 100%;
  height: var(--card-img-h);
  overflow: hidden;
}
.mat-card .card-swatch {
  width: 100%;
  height: 100%;
  transition: transform 0.35s ease;
  object-fit: cover;
  display: block;
}
.mat-card:hover .card-swatch { transform: scale(1.07); }
.mat-card .card-swatch.img-swatch {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.4s ease, transform 0.35s ease;
}
.mat-card .card-swatch.img-swatch.loaded { opacity: 1; }
.mat-card .card-swatch-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  transition: transform 0.35s ease;
}
.mat-card:hover .card-swatch-bg,
.mat-card:hover .card-swatch { transform: scale(1.07); }
/* shimmer loading state */
.card-img-wrap.loading::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  z-index: 1;
}
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
.mat-card .card-check {
  position: absolute;
  top: 6px; right: 6px;
  width: 20px; height: 20px;
  background: var(--accent);
  border-radius: 50%;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: #fff;
  font-weight: bold;
  z-index: 2;
  box-shadow: 0 2px 8px rgba(47,94,140,0.4);
}
.mat-card.selected .card-check { display: flex; }
.mat-card .card-label {
  padding: 7px 8px 9px;
  font-size: 10.5px;
  color: var(--text-mid);
  line-height: 1.35;
  text-align: center;
  font-weight: 400;
}
.mat-card.selected .card-label {
  color: var(--accent);
  font-weight: 500;
}

/* ══════════════════════════════════════
   CHIPS
══════════════════════════════════════ */
.options-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 7px;
}
.chip {
  background: var(--bg2);
  border: 1.5px solid var(--border);
  color: var(--text-mid);
  padding: 7px 14px;
  border-radius: 40px;
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 400;
  transition: all var(--transition);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  letter-spacing: 0.01em;
}
.chip:hover { border-color: var(--accent-light); color: var(--text); background: var(--accent-dim); }
.chip.selected { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 500; }

/* ══════════════════════════════════════
   COLOR CHIPS
══════════════════════════════════════ */
.color-chip {
  display: flex;
  align-items: center;
  gap: 9px;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  color: var(--text-mid);
  padding: 7px 14px 7px 9px;
  border-radius: 40px;
  cursor: pointer;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 400;
  transition: all var(--transition);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.color-chip:hover { border-color: var(--accent-light); color: var(--text); background: var(--accent-dim); }
.color-chip.selected { background: var(--accent); border-color: var(--accent); color: #fff; }
.color-swatch {
  width: 16px; height: 16px;
  border-radius: 50%;
  flex-shrink: 0;
  border: 1.5px solid rgba(26,23,20,0.12);
}

/* ══════════════════════════════════════
   CHECKBOX ITEMS
══════════════════════════════════════ */
.surroundings-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
  gap: 6px;
}
.check-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--bg2);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 12px;
  cursor: pointer;
  transition: all var(--transition);
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.check-item:hover { border-color: var(--accent-light); background: var(--accent-dim); }
.check-item.checked { border-color: var(--accent); background: var(--accent-dim); }
.check-box {
  width: 16px; height: 16px;
  border: 1.5px solid var(--border2);
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all var(--transition);
  background: var(--surface);
}
.check-item.checked .check-box { background: var(--accent); border-color: var(--accent); }
.check-tick { color: #fff; font-size: 10px; font-weight: bold; display: none; }
.check-item.checked .check-tick { display: block; }
.check-label { font-size: 12px; color: var(--text-mid); font-weight: 400; }
.check-item.checked .check-label { color: var(--accent); font-weight: 500; }

.quick-actions { display: flex; gap: 8px; margin-bottom: 10px; }
.quick-btn {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px; letter-spacing: 0.06em; font-weight: 500;
  padding: 5px 14px;
  border-radius: 20px; cursor: pointer;
  border: 1.5px solid var(--border);
  background: transparent; color: var(--text-dim);
  transition: all var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.quick-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

/* ══════════════════════════════════════
   OUTPUT PANEL
══════════════════════════════════════ */
.output-panel {
  background: var(--text);
  display: flex;
  flex-direction: column;
  height: 100%;
  border-left: 1px solid rgba(255,255,255,0.06);
}
.output-header {
  padding: 22px 26px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}
.output-header-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.output-label {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 20px;
  font-weight: 300;
  color: #fff;
  letter-spacing: 0.01em;
}
.output-model-tag {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
  font-weight: 500;
}
.output-meta {
  font-size: 11px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.04em;
}
.output-word-count {
  color: var(--accent-light);
  font-weight: 500;
}

.output-box {
  flex: 1;
  padding: 20px 26px;
  overflow-y: auto;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  line-height: 1.9;
  color: rgba(255,255,255,0.65);
  white-space: pre-wrap;
  word-break: break-word;
}
.output-box::-webkit-scrollbar { width: 3px; }
.output-box::-webkit-scrollbar-track { background: transparent; }
.output-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

/* highlighted segments inside prompt */
.prompt-base { color: rgba(255,255,255,0.45); }
.prompt-selection { color: #fff; font-weight: 500; }
.prompt-label { color: var(--accent-light); font-style: italic; }

.output-actions {
  padding: 14px 26px 18px;
  border-top: 1px solid rgba(255,255,255,0.07);
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}
.btn-copy {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  padding: 13px 20px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.06em;
  cursor: pointer;
  border-radius: var(--radius);
  transition: all var(--transition);
  -webkit-tap-highlight-color: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn-copy:hover { background: var(--accent-light); }
.btn-copy.copied { background: var(--ok); }
.btn-copy svg { flex-shrink: 0; }

.btn-row {
  display: flex;
  gap: 8px;
}
.btn-secondary {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.45);
  padding: 10px 16px;
  font-family: 'Space Grotesk', sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.06em;
  cursor: pointer;
  border-radius: var(--radius);
  transition: all var(--transition);
  -webkit-tap-highlight-color: transparent;
}
.btn-secondary:hover { border-color: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.08); }
.btn-reset:hover { border-color: rgba(47,94,140,0.4); color: var(--accent-light); background: rgba(47,94,140,0.08); }

/* char count ring */
.output-ring-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
  margin-top: 2px;
}
.ring-label {
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  letter-spacing: 0.06em;
}

/* ══════════════════════════════════════
   MOBILE FAB
══════════════════════════════════════ */
.fab-prompt { display: none; }

/* ══════════════════════════════════════
   TWEAKS PANEL
══════════════════════════════════════ */
.tweaks-panel {
  display: none;
  position: fixed;
  bottom: 24px;
  right: 424px;
  width: 260px;
  background: var(--surface);
  border: 1.5px solid var(--border2);
  border-radius: var(--radius-lg);
  box-shadow: 0 12px 40px rgba(26,23,20,0.15);
  z-index: 500;
  overflow: hidden;
  font-family: 'Space Grotesk', sans-serif;
}
.tweaks-panel.visible { display: block; }
.tweaks-header {
  background: #16222E;
  color: #fff;
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.tweaks-title {
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 16px;
  font-weight: 300;
  color: #fff;
}
.tweaks-close {
  background: none;
  border: none;
  color: rgba(255,255,255,0.5);
  cursor: pointer;
  font-size: 16px;
  padding: 0 2px;
  line-height: 1;
  transition: color var(--transition);
}
.tweaks-close:hover { color: #fff; }
.tweaks-body { padding: 14px 16px; display: flex; flex-direction: column; gap: 14px; font-family: 'IBM Plex Mono', monospace; }
.tweak-group {}
.tweak-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 8px;
}
.tweak-options {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.tweak-btn {
  font-family: 'Space Grotesk', sans-serif;
  font-size: 11px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--bg2);
  color: var(--text-mid);
  cursor: pointer;
  transition: all var(--transition);
}
.tweak-btn:hover { border-color: var(--accent-light); color: var(--accent); }
.tweak-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.tweak-divider { height: 1px; background: var(--border); margin: 2px 0; }

/* ══════════════════════════════════════
   CARD HOVER PREVIEW (feature 2)
══════════════════════════════════════ */
.card-preview-popup {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  border: 1.5px solid var(--border2);
  opacity: 0;
  transform: scale(0.92) translateY(6px);
  transition: opacity 0.18s ease, transform 0.18s ease;
  width: 220px;
  background: var(--surface);
}
.card-preview-popup.visible {
  opacity: 1;
  transform: scale(1) translateY(0);
}
.card-preview-img-wrap {
  width: 220px;
  height: 148px;
  overflow: hidden;
  position: relative;
}
.card-preview-img-wrap .card-swatch-bg,
.card-preview-img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  position: absolute; inset: 0;
}
.card-preview-name {
  padding: 9px 12px 10px;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 14px;
  font-weight: 400;

}

/* ══════════════════════════════════════
   SELECTED THUMBNAILS STRIP (feature 4)
══════════════════════════════════════ */
.picks-strip {
  padding: 10px 26px 0;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
}
.picks-strip-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
  margin-bottom: 7px;
}
.picks-thumbs {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  padding-bottom: 10px;
}
.pick-thumb {
  width: 36px;
  height: 36px;
  border-radius: 5px;
  overflow: hidden;
  position: relative;
  border: 1.5px solid rgba(255,255,255,0.15);
  flex-shrink: 0;
  cursor: default;
}
.pick-thumb-bg {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
}
.pick-thumb img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  opacity: 0;
  transition: opacity 0.3s;
}
.pick-thumb img.loaded { opacity: 1; }
.pick-thumb-tip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.85);
  color: #fff;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  padding: 4px 8px;
  border-radius: 4px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.15s;
  z-index: 10;
  letter-spacing: 0.04em;
}
.pick-thumb:hover .pick-thumb-tip { opacity: 1; }
.picks-empty {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: rgba(255,255,255,0.2);
  padding-bottom: 10px;
  letter-spacing: 0.06em;
}

/* ══════════════════════════════════════
   PRESETS (feature 5)
══════════════════════════════════════ */
.presets-bar {
  display: flex;
  gap: 6px;
  padding: 10px 26px;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  flex-shrink: 0;
  align-items: center;
  flex-wrap: wrap;
}
.presets-label {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.28);
  margin-right: 2px;
  white-space: nowrap;
}
.preset-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.55);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: 0.04em;
}
.preset-chip:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }
.preset-chip .preset-del {
  color: rgba(255,255,255,0.3);
  font-size: 11px;
  line-height: 1;
  margin-left: 2px;
  padding: 0 2px;
  transition: color var(--transition);
}
.preset-chip .preset-del:hover { color: #ff6b6b; }
.btn-save-preset {
  display: flex;
  align-items: center;
  gap: 5px;
  background: transparent;
  border: 1px dashed rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.35);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 20px;
  cursor: pointer;
  transition: all var(--transition);
  letter-spacing: 0.04em;
}
.btn-save-preset:hover { border-color: var(--accent-light); color: var(--accent-light); }

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media (max-width: 900px) {
  .main-layout { grid-template-columns: 1fr; height: auto; overflow: visible; }
  .wizard-panel { padding: 20px 16px 120px; height: auto; }
  .site-header { padding: 0 16px; }

  .output-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 64vh;
    border-radius: 18px 18px 0 0;
    transform: translateY(calc(100% - 0px));
    transition: transform 0.38s cubic-bezier(0.4,0,0.2,1);
    z-index: 200;
    box-shadow: 0 -12px 48px rgba(26,23,20,0.25);
    border-left: none;
    border-top: 2px solid var(--accent-light);
  }
  .output-panel.open { transform: translateY(0); }
  .output-header { padding-top: 24px; position: relative; }
  .output-header::before {
    content: '';
    width: 36px; height: 4px;
    background: rgba(255,255,255,0.15);
    border-radius: 2px;
    position: absolute;
    top: 10px; left: 50%;
    transform: translateX(-50%);
    display: block;
  }

  .fab-prompt {
    display: flex;
    align-items: center; gap: 8px;
    position: fixed;
    bottom: 18px; right: 16px;
    background: var(--text); color: #fff;
    border: 2px solid var(--accent-light);
    padding: 13px 20px;
    border-radius: 50px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; font-weight: 600;
    cursor: pointer; z-index: 300;
    box-shadow: 0 6px 24px rgba(26,23,20,0.3);
    transition: all var(--transition);
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 0.04em;
  }
  .fab-prompt:active { transform: scale(0.96); }
  .fab-count {
    background: var(--accent); color: #fff;
    border-radius: 50px;
    padding: 2px 9px;
    font-size: 11px;
    font-weight: 700;
    min-width: 22px; text-align: center;
  }
  .backdrop {
    display: none;
    position: fixed; inset: 0;
    background: rgba(26,23,20,0.5);
    z-index: 190;
  }
  .backdrop.visible { display: block; }
  .tweaks-panel { right: 16px; bottom: 80px; }
}

var outputMode = 'image';
var SUBJECT_DEFAULT = 'commercial building';
var AUDIO_AMBIENCE = 'light wind, distant city ambience, soft street tones';
var VIDEO_CAMERAS = {
  orbit: [
    'aerial drone orbit that circles the building in one unbroken move, revealing the full facade and glazing',
    'rising crane reveal that lifts up the full height of the tower',
    'slow push-in toward the main entrance and lobby',

    'a crane rise connecting the two framed views',
    'a sweeping orbit connecting the opening and closing angles'
  ]
};
var videoState = { mode: 'orbit', ratio: '16:9', camera: 0, chain: 3 };
var lastSequence = [];
var DIRECTIONS = {
  cw:   { first: 'orbiting clockwise around the building', cont: 'orbiting clockwise' },
  ccw:  { first: 'orbiting counter-clockwise around the building', cont: 'orbiting counter-clockwise' },
  push: { first: 'moving in a continuous forward push toward the building', cont: 'pushing forward' },
  rise: { first: 'craning continuously upward along the building', cont: 'craning upward' }
};

function vCap(s){ return s.charAt(0).toUpperCase() + s.slice(1); }

function fillVideoCameras(){
  var sel = document.getElementById('vpCamera');
  var list = VIDEO_CAMERAS[videoState.mode];
  var html = '';
  for (var i = 0; i < list.length; i++){ html += '<option value="' + i + '">' + vCap(list[i]) + '</option>'; }
  sel.innerHTML = html;
  videoState.camera = 0;
}

function updateVideoGuide(){
  var g = document.getElementById('vpGuide');
  if (videoState.mode === 'orbit'){
    g.innerHTML = '<b>Image slots:</b> upload all 2&ndash;3 renders as plain reference images. Materials come from the images, so the text stays lean.';
  } else if (videoState.mode === 'keyframe'){
    g.innerHTML = '<b>Image slots:</b> set image 1 as the <b>first frame</b> and the last render as the <b>final frame</b>. A third image (if any) is a content reference.';
  } else {
    g.innerHTML = '<b>Per clip:</b> upload two frames &mdash; image N as the opening frame, image N+1 as the closing frame. Reuse each boundary image as the start of the next clip, and trim one duplicate frame when stitching.';
  }
}

function setOutputMode(m){
  outputMode = m;
  document.getElementById('vpModeImage').classList.toggle('active', m === 'image');
  document.getElementById('vpModeVideo').classList.toggle('active', m === 'video');
  document.getElementById('vpControls').classList.toggle('show', m === 'video');
  var tag = document.querySelector('.output-model-tag');
  if (tag){ tag.textContent = (m === 'video') ? 'Veo 3.1 / Gemini Omni' : 'Gemini \u00b7 Imagen'; }
  updateOutput();
}

function setVideoMode(m){
  videoState.mode = m;
  var btns = document.querySelectorAll('.vp-seg');
  for (var i = 0; i < btns.length; i++){ btns[i].classList.toggle('active', btns[i].getAttribute('data-vmode') === m); }
  var camWrap = document.getElementById('vpCameraWrap');
  var seq = document.getElementById('vpSeqControls');
  if (m === 'sequence'){
    if (camWrap) camWrap.style.display = 'none';
    if (seq) seq.classList.add('show');
  } else {
    if (camWrap) camWrap.style.display = '';
    if (seq) seq.classList.remove('show');
    fillVideoCameras();
  }
  updateVideoGuide();
  updateOutput();
}

function setVideoRatio(r){
  videoState.ratio = r;
  var btns = document.querySelectorAll('.vp-ratio');
  for (var i = 0; i < btns.length; i++){ btns[i].classList.toggle('active', btns[i].getAttribute('data-vr') === r); }
  updateOutput();
}

function onVideoField(){ updateOutput(); }

function buildVideoPromptLines(){
  var loc = state.location ? (' in ' + state.location) : '';
  var subjEl = document.getElementById('vpSubject');
  var subject = (subjEl && subjEl.value.trim()) ? subjEl.value.trim() : SUBJECT_DEFAULT;
  var subjectFull = subject + loc;
  var list = VIDEO_CAMERAS[videoState.mode];
  var cam = list[videoState.camera] || list[0];
  var intro;
  if (videoState.mode === 'orbit'){
    intro = 'The reference images are the SAME building shown from different angles \u2014 treat them as one consistent structure, not separate buildings. Continuous cinematic ' + cam + ' of a single ' + subjectFull + '.';
  } else {
    intro = 'Use the FIRST reference image as the opening frame and the LAST as the closing frame. They are the SAME ' + subjectFull + '. Generate one continuous camera move between the two views: ' + cam + '.';
  }
  var parts = [intro];
  var inheritEl = document.getElementById('vpInheritLight');
  if (inheritEl && inheritEl.checked && state.lighting){ parts.push(vCap(state.lighting) + '.'); }
  var q = ['photorealistic, high detail'];
  if (document.getElementById('vpGeo').checked) q.push('stable geometry, no morphing or warping of the structure');
  if (document.getElementById('vpNoText').checked) q.push('no text');
  if (document.getElementById('vpNoPeople').checked) q.push('no people');
  parts.push(vCap(q.join(', ')) + '.');
  if (document.getElementById('vpAudio').checked) parts.push('Subtle native ambient audio: ' + AUDIO_AMBIENCE + '.');
  var pEl = document.getElementById('vpPacing');
  var pacing = pEl ? pEl.value : 'slow, premium real-estate pacing';
  var ratio = videoState.ratio;
  parts.push(vCap(pacing) + '. ' + ratio + (ratio === '9:16' ? ' vertical' : '') + '.');
  return [parts.join(' ')];
}

function changeChain(d){
  var n = videoState.chain + d;
  if (n < 3) n = 3;
  if (n > 6) n = 6;
  videoState.chain = n;
  document.getElementById('vpChainCount').textContent = n;
  document.getElementById('vpClipNote').textContent = (n - 1) + ' clips';
  updateOutput();
}

function buildSequencePrompts(){
  var loc = state.location ? (' in ' + state.location) : '';
  var subjEl = document.getElementById('vpSubject');
  var subject = (subjEl && subjEl.value.trim()) ? subjEl.value.trim() : SUBJECT_DEFAULT;
  var subjectFull = subject + loc;
  var dirEl = document.getElementById('vpDirection');
  var dir = DIRECTIONS[dirEl ? dirEl.value : 'cw'] || DIRECTIONS.cw;
  var clips = videoState.chain - 1;
  var inheritEl = document.getElementById('vpInheritLight');
  var useLight = inheritEl && inheritEl.checked && state.lighting;
  var q = ['photorealistic, high detail'];
  if (document.getElementById('vpGeo').checked) q.push('stable geometry, no morphing or warping of the structure');
  if (document.getElementById('vpNoText').checked) q.push('no text');
  if (document.getElementById('vpNoPeople').checked) q.push('no people');
  var qLine = vCap(q.join(', ')) + '.';
  var audioOn = document.getElementById('vpAudio').checked;
  var pEl = document.getElementById('vpPacing');
  var pacing = pEl ? pEl.value : 'slow, premium real-estate pacing';
  var ratio = videoState.ratio;
  var ratioLine = vCap(pacing) + '. ' + ratio + (ratio === '9:16' ? ' vertical' : '') + '.';
  var out = [];
  for (var i = 0; i < clips; i++){
    var isFirst = (i === 0);
    var isLast = (i === clips - 1);
    var intro = 'Use the FIRST reference image as the opening frame and the SECOND as the closing frame. They are the SAME ' + subjectFull + '. ';
    var motion;
    if (isFirst){
      motion = 'One continuous cinematic camera move from the first angle to the second, ' + dir.first + '. Maintain constant camera speed and momentum through the final frame \u2014 do not slow down, ease out, or stop at the end.';
    } else {
      motion = 'Continue the previous shot with no pause: begin already in motion at full speed and keep ' + dir.cont + ' in the same direction, from this angle to the next. Do not ease in or accelerate from rest at the start.';
      if (isLast){ motion += ' You may let the camera settle gently only at the very end of this final clip.'; }
      else { motion += ' Maintain constant speed and momentum through the final frame \u2014 do not slow down or stop at the end.'; }
    }
    var parts = [intro + motion];
    if (useLight){ parts.push(vCap(state.lighting) + (isFirst ? '.' : ', identical grade to the previous clip.')); }
    parts.push(qLine);
    if (audioOn){ parts.push('Subtle native ambient audio: ' + AUDIO_AMBIENCE + '.'); }
    parts.push(ratioLine);
    out.push({ label: 'Clip ' + (i + 1) + '  \u00b7  image ' + (i + 1) + ' \u2192 image ' + (i + 2), text: parts.join(' ') });
  }
  return out;
}

function copyClip(idx, btn){
  if (!lastSequence[idx]) return;
  navigator.clipboard.writeText(lastSequence[idx].text).then(function(){
    var old = btn.textContent;
    btn.textContent = 'Copied';
    setTimeout(function(){ btn.textContent = old; }, 1600);
  });
}

function renderVideoOutput(){
  var box = document.getElementById('outputBox');
  box.innerHTML = '';
  if (videoState.mode === 'sequence'){
    lastSequence = buildSequencePrompts();
    var total = 0;
    for (var i = 0; i < lastSequence.length; i++){
      total += lastSequence[i].text.split(/\s+/).filter(Boolean).length;
      var clip = document.createElement('div');
      clip.className = 'vp-clip';
      var head = document.createElement('div');
      head.className = 'vp-clip-head';
      var lab = document.createElement('span');
      lab.className = 'vp-clip-label';
      lab.textContent = lastSequence[i].label;
      var cp = document.createElement('button');
      cp.className = 'vp-clip-copy';
      cp.textContent = 'Copy';
      cp.onclick = (function(idx){ return function(){ copyClip(idx, this); }; })(i);
      head.appendChild(lab);
      head.appendChild(cp);
      var txt = document.createElement('div');
      txt.className = 'vp-clip-text';
      txt.textContent = lastSequence[i].text;
      clip.appendChild(head);
      clip.appendChild(txt);
      box.appendChild(clip);
    }
    document.getElementById('wordCount').textContent = total + ' words';
    document.getElementById('selectionCount').textContent = lastSequence.length + ' clips';
    return;
  }
  var lines = buildVideoPromptLines();
  var text = lines.join('\n');
  var words = text.split(/\s+/).filter(Boolean).length;
  document.getElementById('wordCount').textContent = words + ' words';
  document.getElementById('selectionCount').textContent = 'video mode';
  var p = document.createElement('p');
  p.style.cssText = 'margin-bottom:4px;color:rgba(255,255,255,0.82);line-height:1.7;';
  p.textContent = text;
  box.appendChild(p);
}

function initVideoUI(){
  var subjEl = document.getElementById('vpSubject');
  if (subjEl) subjEl.value = SUBJECT_DEFAULT;
  fillVideoCameras();
  updateVideoGuide();
}

function buildWizard() {
  const container = document.getElementById('wizardSteps');
  STEPS.forEach((step, idx) => {
    const stepEl = document.createElement('div');
    stepEl.className = 'step';
    stepEl.id = `step-${step.key}`;
    stepEl.dataset.key = step.key;

    stepEl.innerHTML = `
      <div class="step-header" onclick="toggleStep('${step.key}')">
        <div class="step-num">${idx + 1}</div>
        <div>
          <div class="step-title">${step.title}</div>
          <div class="step-subtitle">${step.subtitle}</div>
        </div>
        <div class="step-badge empty" id="badge-${step.key}">—</div>
        <svg class="step-chevron" viewBox="0 0 18 18" fill="none">
          <path d="M4.5 6.75L9 11.25L13.5 6.75" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="step-body" id="body-${step.key}">
        <div class="step-hint">${step.multi ? 'Multi-select' : 'Single select'}</div>
        <div id="content-${step.key}"></div>
      </div>`;

    container.appendChild(stepEl);
    buildStepContent(step);
  });

  // open first step by default
  toggleStep('facade');
}

function buildStepContent(step) {
  const container = document.getElementById(`content-${step.key}`);
  if (!container) return;

  if (step.key === 'surroundings') {
    const qActns = document.createElement('div');
    qActns.className = 'quick-actions';
    qActns.innerHTML = `<button class="quick-btn" onclick="selectAllSurroundings()">Select All</button><button class="quick-btn" onclick="clearSurroundings()">Clear All</button>`;
    container.appendChild(qActns);
    const grid = document.createElement('div');
    grid.className = 'surroundings-grid';
    DATA[step.key].forEach(val => {
      const el = document.createElement('div');
      el.className = 'check-item';
      el.dataset.key = step.key; el.dataset.val = val;
      el.innerHTML = `<div class="check-box"><span class="check-tick">✓</span></div><span class="check-label">${val}</span>`;
      el.addEventListener('click', () => toggleMulti(step.key, val, el));
      grid.appendChild(el);
    });
    container.appendChild(grid);

  } else if (step.key === 'color') {
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    DATA[step.key].forEach(val => {
      const el = document.createElement('div');
      el.className = 'color-chip';
      el.dataset.key = step.key; el.dataset.val = val;
      const sw = document.createElement('div');
      sw.className = 'color-swatch';
      sw.style.background = COLOR_SWATCHES[val] || '#888';
      el.appendChild(sw);
      el.appendChild(document.createTextNode(val));
      el.addEventListener('click', () => selectSingle(step.key, val));
      grid.appendChild(el);
    });
    container.appendChild(grid);

  } else if (CARD_KEYS.includes(step.key)) {
    const grid = document.createElement('div');
    grid.className = 'cards-grid';
    DATA[step.key].forEach((val, idx) => {
      const card = document.createElement('div');
      card.className = 'mat-card';
      card.dataset.key = step.key; card.dataset.val = val;

      const imgWrap = document.createElement('div');
      imgWrap.className = 'card-img-wrap';
      imgWrap.style.position = 'relative';

      // gradient fallback layer (always present behind image)
      const bg = document.createElement('div');
      bg.className = 'card-swatch-bg';
      bg.style.background = VISUALS[val] || 'linear-gradient(135deg,#ddd8d0 0%,#c0bcb4 100%)';
      imgWrap.appendChild(bg);

      // real image on top
      const imgEl = document.createElement('img');
      imgEl.className = 'card-swatch img-swatch';
      imgEl.alt = val;
      imgEl.loading = 'lazy';
      imgWrap.appendChild(imgEl);

      const chk = document.createElement('div');
      chk.className = 'card-check'; chk.textContent = '✓';
      imgWrap.appendChild(chk);

      const lbl = document.createElement('div');
      lbl.className = 'card-label'; lbl.textContent = val;

      card.appendChild(imgWrap);
      card.appendChild(lbl);
      // hover preview (feature 2)
      const previewKeyword = IMG_KEYWORDS[val] || val + ' architecture material';
      const previewSeed = step.key.charCodeAt(0) * 100 + idx;
      const previewGrad = VISUALS[val] || '';
      card.addEventListener('mouseenter', () => showCardPreview(card, val, previewKeyword, previewGrad, previewSeed));
      card.addEventListener('mouseleave', hideCardPreview);

      card.addEventListener('click', () => step.multi ? toggleMulti(step.key, val, card) : selectSingle(step.key, val));
      grid.appendChild(card);

      // lazy load image using IntersectionObserver
      const keyword = IMG_KEYWORDS[val] || val + ' architecture material';
      const seed = step.key.charCodeAt(0) * 100 + idx;
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            loadCardImage(imgEl, bg, keyword, VISUALS[val] || '', seed);
            observer.disconnect();
          }
        });
      }, { rootMargin: '200px' });
      observer.observe(card);
    });
    container.appendChild(grid);

  } else {
    // plain chips
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    DATA[step.key].forEach(val => {
      const el = document.createElement('div');
      el.className = 'chip';
      el.dataset.key = step.key; el.dataset.val = val;
      el.textContent = val;
      el.addEventListener('click', () => step.multi ? toggleMulti(step.key, val, el) : selectSingle(step.key, val));
      grid.appendChild(el);
    });
    container.appendChild(grid);
  }
}

function toggleStep(key) {
  const el = document.getElementById(`step-${key}`);
  const isOpen = el.classList.contains('open');
  el.classList.toggle('open', !isOpen);
}
function expandAll() {
  STEPS.forEach(s => document.getElementById(`step-${s.key}`).classList.add('open'));
}
function collapseAll() {
  STEPS.forEach(s => document.getElementById(`step-${s.key}`).classList.remove('open'));
}

// ══════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════
function selectSingle(key, val) {
  state[key] = state[key] === val ? null : val;
  document.querySelectorAll(`[data-key="${key}"]`).forEach(el => {
    const isSel = el.dataset.val === state[key];
    el.classList.toggle('selected', isSel);
  });
  updateBadge(key);
  updateOutput();
  autoAdvance(key);
}

function toggleMulti(key, val, el) {
  const idx = state[key].indexOf(val);
  if (idx > -1) {
    state[key].splice(idx, 1);
    el.classList.remove('selected', 'checked');
  } else {
    state[key].push(val);
    el.classList.add(key === 'surroundings' ? 'checked' : 'selected');
  }
  updateBadge(key);
  updateOutput();
}

function selectAllSurroundings() {
  state['surroundings'] = [...DATA['surroundings']];
  document.querySelectorAll('[data-key="surroundings"]').forEach(el => el.classList.add('checked'));
  updateBadge('surroundings');
  updateOutput();
}
function clearSurroundings() {
  state['surroundings'] = [];
  document.querySelectorAll('[data-key="surroundings"]').forEach(el => el.classList.remove('checked'));
  updateBadge('surroundings');
  updateOutput();
}

function autoAdvance(key) {
  // after selecting a single item, open the next step
  const idx = STEPS.findIndex(s => s.key === key);
  if (idx >= 0 && idx < STEPS.length - 1 && !STEPS[idx].multi) {
    const curr = document.getElementById(`step-${key}`);
    curr.classList.remove('open');
    const next = document.getElementById(`step-${STEPS[idx + 1].key}`);
    next.classList.add('open');
    // scroll to next
    setTimeout(() => {
      const rect = next.getBoundingClientRect();
      const panel = next.closest('.wizard-panel');
      panel.scrollBy({ top: rect.top - 80, behavior: 'smooth' });
    }, 100);
  }
}

// ══════════════════════════════════════════════════════
// BADGE
// ══════════════════════════════════════════════════════
function updateBadge(key) {
  const badge = document.getElementById(`badge-${key}`);
  const stepEl = document.getElementById(`step-${key}`);
  const val = state[key];
  const isEmpty = Array.isArray(val) ? val.length === 0 : val === null;
  if (isEmpty) {
    badge.textContent = '—';
    badge.className = 'step-badge empty';
    stepEl.classList.remove('has-selection');
  } else {
    const count = Array.isArray(val) ? val.length : 1;
    badge.textContent = Array.isArray(val) ? `${count} selected` : val.split(' ').slice(0, 3).join(' ') + (val.split(' ').length > 3 ? '…' : '');
    badge.className = 'step-badge filled';
    stepEl.classList.add('has-selection');
  }
}

// ══════════════════════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════════════════════
function countSelections() {
  let n = 0;
  STEPS.forEach(s => {
    const v = state[s.key];
    if (Array.isArray(v) ? v.length > 0 : v !== null) n++;
  });
  return n;
}

function updateProgress() {
  const total = STEPS.length;
  const done = countSelections();
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} / ${total}`;
  document.getElementById('selCount').textContent = done;
  document.getElementById('fabCount').textContent = done;
}

// ══════════════════════════════════════════════════════
// OUTPUT
// ══════════════════════════════════════════════════════
function buildPromptLines() {
  const lines = [];
  lines.push(`Transform this uploaded Revit commercial building screenshot into a high-end photorealistic architectural render. Closely follow the original geometry, massing, and floor count. Maintain the exact locations of façade openings, structural grid, entrances, window locations, and signage zones, allowing only minor volumetric adjustments necessary to accommodate realistic material thickness (like deep mullions or exterior louvers). Preserve the roof shape and overall architectural intent. Do not change the input aspect ratio.`);
  lines.push('');
  lines.push(`Replace the raw Revit appearance with premium commercial materials, refined urban details, realistic surroundings, and strong marketable presence.`);
  lines.push('');
  if (state.facade)             lines.push(`Main façade material: ${state.facade}.`);
  if (state.accent.length)      lines.push(`Accent materials: ${state.accent.join(', ')}.`);
  if (state.color)              lines.push(`Color palette: ${state.color}.`);
  if (state.windowSystem)       lines.push(`Window system: ${state.windowSystem}.`);
  if (state.glass)              lines.push(`Glass type: ${state.glass}.`);
  if (state.shading)            lines.push(`Shading elements: ${state.shading}.`);
  if (state.entrance)           lines.push(`Main entrance: ${state.entrance}.`);
  if (state.groundFloor)        lines.push(`Ground floor use: ${state.groundFloor}.`);
  if (state.door)               lines.push(`Door style: ${state.door}.`);
  if (state.roof)               lines.push(`Roof design: ${state.roof}.`);
  lines.push('');
  if (state.location)           lines.push(`Set the building in: ${state.location}.`);
  if (state.surroundings.length) {
    lines.push('');
    lines.push(`Add realistic commercial surroundings including: ${state.surroundings.join(', ')}.`);
  }
  lines.push('');
  if (state.lighting)           lines.push(`Lighting mood: ${state.lighting}.`);
  if (state.camera)             lines.push(`Camera view: ${state.camera}.`);
  lines.push('');
  lines.push(`Rendering style: ultra realistic, premium commercial visualization, high detail, sharp textures, realistic glass reflections, cinematic shadows, polished materials, architectural magazine quality, developer marketing render, elegant composition, strong street presence.`);
  lines.push('');
  lines.push(`Important: Follow original geometry closely, allowing for material thickness. Keep all floors exactly as original. Keep façade proportions unchanged. Keep entrance positions unchanged. Keep structural rhythm unchanged. Do not invent extra towers or masses. Improve realism only. Maintain clean scale and perspective. Respect original architectural design. Do not change the input aspect ratio.`);
  lines.push('');
  lines.push(`Use premium commercial real estate marketing style suitable for billboard, brochure, website, leasing campaign, and investor presentation.`);
  return lines;
}

function updateOutput() {
  updateProgress();
  updatePicksStrip();
  if (outputMode === 'video') { renderVideoOutput(); return; }
  const lines = buildPromptLines();
  const text = lines.join('\n');

  // word count
  const words = text.split(/\s+/).filter(Boolean).length;
  document.getElementById('wordCount').textContent = `${words} words`;

  const n = countSelections();
  document.getElementById('selectionCount').textContent = `${n} selection${n !== 1 ? 's' : ''}`;

  // render with highlighted selections
  const outputBox = document.getElementById('outputBox');
  outputBox.innerHTML = '';

  // Build highlighted output
  const selectionValues = [];
  STEPS.forEach(s => {
    const v = state[s.key];
    if (Array.isArray(v)) v.forEach(x => selectionValues.push(x));
    else if (v) selectionValues.push(v);
  });

  // Sort by length desc so longer matches take precedence
  selectionValues.sort((a, b) => b.length - a.length);

  lines.forEach((line, li) => {
    if (line === '') {
      outputBox.appendChild(document.createElement('br'));
      return;
    }
    const p = document.createElement('p');
    p.style.cssText = 'margin-bottom:4px;';
    let remaining = line;
    let html = '';

    // Highlight any selection values
    let tempLine = line;
    selectionValues.forEach(v => {
      if (tempLine.includes(v)) {
        tempLine = tempLine.split(v).join(`__SEL__${v}__ENDSEL__`);
      }
    });

    const parts = tempLine.split(/(__SEL__|__ENDSEL__)/);
    let inSel = false;
    parts.forEach(part => {
      if (part === '__SEL__') { inSel = true; return; }
      if (part === '__ENDSEL__') { inSel = false; return; }
      if (inSel) {
        html += `<span style="color:#fff;font-weight:500;">${part}</span>`;
      } else {
        html += `<span style="color:rgba(255,255,255,0.45);">${part}</span>`;
      }
    });
    p.innerHTML = html;
    outputBox.appendChild(p);
  });
}

function printPrompt() {
  // Save current state to localStorage so the print page can read it
  localStorage.setItem('revit_print_state', JSON.stringify(state));
  window.open('Revit Prompt Builder v2-print.html', '_blank');
}

function copyPrompt() {
  let text;
  if (outputMode === 'video' && videoState.mode === 'sequence') {
    text = buildSequencePrompts().map(function(c){ return c.label + '\n' + c.text; }).join('\n\n');
  } else if (outputMode === 'video') {
    text = buildVideoPromptLines().join('\n');
  } else {
    text = buildPromptLines().join('\n');
  }
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7L5.5 10L11.5 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg> Copied!`;
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><rect x="1" y="4" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M4 4V2.5A1.5 1.5 0 015.5 1H11.5A1.5 1.5 0 0113 2.5V8.5A1.5 1.5 0 0111.5 10H10" stroke="currentColor" stroke-width="1.5"/></svg> Copy Prompt`;
      btn.classList.remove('copied');
    }, 2400);
  });
}

function resetAll() {
  STEPS.forEach(s => { state[s.key] = s.multi ? [] : null; });
  document.querySelectorAll('.mat-card,.chip,.color-chip').forEach(el => el.classList.remove('selected'));
  document.querySelectorAll('.check-item').forEach(el => el.classList.remove('checked'));
  STEPS.forEach(s => updateBadge(s.key));
  updateOutput();
  updatePicksStrip();
}

  const panel = document.getElementById('outputPanel');

// TWEAKS
// ══════════════════════════════════════════════════════
function closeTweaks() {
  document.getElementById('tweaksPanel').classList.remove('visible');
  window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
}
function setCardSize(sz) {
  const sizes = { sm: { w: '110px', h: '72px' }, md: { w: '136px', h: '90px' }, lg: { w: '164px', h: '108px' } };
  const { w, h } = sizes[sz] || sizes.md;
  document.documentElement.style.setProperty('--card-w', w);
  document.documentElement.style.setProperty('--card-img-h', h);
  document.querySelectorAll('[onclick^="setCardSize"]').forEach(b => b.classList.remove('active'));
  document.querySelector(`[onclick="setCardSize('${sz}')"]`).classList.add('active');
}
function setTheme(t) {
  const themes = {
    warm: { bg:'#EDF2EE', bg2:'#E1EBE3', surface:'#FFFFFF', surface2:'#E8F0EA', border:'#C8DDD0', border2:'#AECFB8', text:'#111C15', accent:'#2D6044' },
    cool: { bg:'#EEF3F8', bg2:'#E2EAF2', surface:'#FFFFFF', surface2:'#E8EFF8', border:'#C8D8E8', border2:'#A8C0D8', text:'#141C28', accent:'#2558A0' },
    dark: { bg:'#0C1410', bg2:'#121E16', surface:'#162A1E', surface2:'#1A3022', border:'#1E3828', border2:'#2A5038', text:'#C8E0D0', accent:'#4A9E6A' },
  };
  const th = themes[t] || themes.warm;
  const root = document.documentElement;
  Object.entries(th).forEach(([k, v]) => root.style.setProperty(`--${k}`, v));
  document.querySelectorAll('[onclick^="setTheme"]').forEach(b => b.classList.remove('active'));
  document.querySelector(`[onclick="setTheme('${t}')"]`).classList.add('active');
}

// ══════════════════════════════════════════════════════
// FEATURE 2: CARD HOVER PREVIEW POPUP
// ══════════════════════════════════════════════════════
let previewTimeout = null;
const popup = document.getElementById('cardPreviewPopup');

function showCardPreview(card, val, keyword, gradient, seed) {
  clearTimeout(previewTimeout);
  previewTimeout = setTimeout(() => {
    // Position popup
    const rect = card.getBoundingClientRect();
    const popW = 220, popH = 180;
    let left = rect.right + 10;
    let top  = rect.top + rect.height / 2 - popH / 2;
    if (left + popW > window.innerWidth - 10) left = rect.left - popW - 10;
    if (top < 10) top = 10;
    if (top + popH > window.innerHeight - 10) top = window.innerHeight - popH - 10;

    popup.style.left = left + 'px';
    popup.style.top  = top + 'px';

    // set content
    const bgEl  = document.getElementById('cardPreviewBg');
    const imgEl = document.getElementById('cardPreviewImg');
    const nameEl = document.getElementById('cardPreviewName');
    bgEl.style.background = gradient || '';
    nameEl.textContent = val;
    imgEl.style.opacity = '0';
    imgEl.classList.remove('loaded');

    // Show a sharp photo in the hover preview only if a custom URL is set.
    const previewCustom = IMG_URLS[val];
    if (previewCustom && previewCustom.trim() !== '') {
      const url = previewCustom.trim();
      const tmp = new Image();
      tmp.onload = () => {
        imgEl.src = url;
        imgEl.style.opacity = '1';
      };
      tmp.src = url;
    }

    popup.classList.add('visible');
  }, 320);
}

function hideCardPreview() {
  clearTimeout(previewTimeout);
  popup.classList.remove('visible');
}

// ══════════════════════════════════════════════════════
// FEATURE 4: SELECTED THUMBNAILS STRIP
// ══════════════════════════════════════════════════════
function updatePicksStrip() {
  const row   = document.getElementById('picksThumbsRow');
  const empty = document.getElementById('picksEmpty');
  row.innerHTML = '';

  const allPicks = []; // { val, key }
  STEPS.forEach(s => {
    if (!CARD_KEYS.includes(s.key)) return; // only card sections
    const v = state[s.key];
    if (Array.isArray(v)) v.forEach(x => allPicks.push({ val: x, key: s.key }));
    else if (v) allPicks.push({ val: v, key: s.key });
  });

  if (allPicks.length === 0) {
    const em = document.createElement('div');
    em.className = 'picks-empty';
    em.textContent = '— none yet';
    row.appendChild(em);
    return;
  }

  allPicks.forEach(({ val, key }, idx) => {
    const thumb = document.createElement('div');
    thumb.className = 'pick-thumb';

    const bg = document.createElement('div');
    bg.className = 'pick-thumb-bg';
    bg.style.background = VISUALS[val] || '#aaa';
    thumb.appendChild(bg);

    const img = document.createElement('img');
    img.alt = val;
    const customUrl = IMG_URLS[val];
    if (customUrl && customUrl.trim() !== '') {
      const url = customUrl.trim();
      const tmp = new Image();
      tmp.onload = () => { img.src = url; img.classList.add('loaded'); };
      tmp.src = url;
    }
    thumb.appendChild(img);

    const tip = document.createElement('div');
    tip.className = 'pick-thumb-tip';
    tip.textContent = val;
    thumb.appendChild(tip);

    row.appendChild(thumb);
  });
}

// ══════════════════════════════════════════════════════
// FEATURE 5: SAVE / LOAD PRESETS
// ══════════════════════════════════════════════════════
function captureVideoConfig(){
  return {
    outputMode: outputMode,
    mode: videoState.mode,
    ratio: videoState.ratio,
    camera: videoState.camera,
    chain: videoState.chain,
    subject: (document.getElementById('vpSubject') || {}).value || '',
    pacing: (document.getElementById('vpPacing') || {}).value || '',
    direction: (document.getElementById('vpDirection') || {}).value || 'cw',
    inheritLight: document.getElementById('vpInheritLight').checked,
    geo: document.getElementById('vpGeo').checked,
    noText: document.getElementById('vpNoText').checked,
    noPeople: document.getElementById('vpNoPeople').checked,
    audio: document.getElementById('vpAudio').checked
  };
}

function applyVideoConfig(v){
  if (!v) return;
  var subj = document.getElementById('vpSubject');
  if (subj) subj.value = v.subject || SUBJECT_DEFAULT;
  var pac = document.getElementById('vpPacing');
  if (pac && v.pacing) pac.value = v.pacing;
  var dir = document.getElementById('vpDirection');
  if (dir && v.direction) dir.value = v.direction;
  document.getElementById('vpInheritLight').checked = (v.inheritLight !== false);
  document.getElementById('vpGeo').checked = (v.geo !== false);
  document.getElementById('vpNoText').checked = (v.noText !== false);
  document.getElementById('vpNoPeople').checked = (v.noPeople !== false);
  document.getElementById('vpAudio').checked = (v.audio !== false);
  videoState.ratio = v.ratio || '16:9';
  videoState.chain = v.chain || 3;
  document.getElementById('vpChainCount').textContent = videoState.chain;
  document.getElementById('vpClipNote').textContent = (videoState.chain - 1) + ' clips';
  var rbtns = document.querySelectorAll('.vp-ratio');
  for (var i = 0; i < rbtns.length; i++){ rbtns[i].classList.toggle('active', rbtns[i].getAttribute('data-vr') === videoState.ratio); }
  setVideoMode(v.mode || 'orbit');
  if ((v.mode || 'orbit') !== 'sequence'){
    videoState.camera = v.camera || 0;
    var camSel = document.getElementById('vpCamera');
    if (camSel) camSel.value = videoState.camera;
  }
  setOutputMode(v.outputMode || 'image');
}

const PRESETS_KEY = 'revit_prompt_presets_v2';

function loadPresetsFromStorage() {
  try { return JSON.parse(localStorage.getItem(PRESETS_KEY) || '[]'); }
  catch { return []; }
}
function savePresetsToStorage(presets) {
  localStorage.setItem(PRESETS_KEY, JSON.stringify(presets));
}

function savePreset() {
  const name = prompt('Name this preset:', `Preset ${loadPresetsFromStorage().length + 1}`);
  if (!name) return;
  const presets = loadPresetsFromStorage();
  presets.push({ name, state: JSON.parse(JSON.stringify(state)), video: captureVideoConfig() });
  savePresetsToStorage(presets);
  renderPresetChips();
}

function loadPreset(idx) {
  const presets = loadPresetsFromStorage();
  const p = presets[idx];
  if (!p) return;
  // restore state
  Object.keys(p.state).forEach(k => { state[k] = p.state[k]; });
  // update UI
  STEPS.forEach(s => {
    const v = state[s.key];
    if (s.key === 'surroundings') {
      document.querySelectorAll('[data-key="surroundings"]').forEach(el => {
        el.classList.toggle('checked', Array.isArray(v) && v.includes(el.dataset.val));
      });
    } else if (Array.isArray(v)) {
      document.querySelectorAll(`[data-key="${s.key}"]`).forEach(el => {
        el.classList.toggle('selected', v.includes(el.dataset.val));
      });
    } else {
      document.querySelectorAll(`[data-key="${s.key}"]`).forEach(el => {
        el.classList.toggle('selected', el.dataset.val === v);
      });
    }
    updateBadge(s.key);
  });
  applyVideoConfig(p.video);
  updateOutput();
  updatePicksStrip();
}

function deletePreset(idx, e) {
  e.stopPropagation();
  const presets = loadPresetsFromStorage();
  presets.splice(idx, 1);
  savePresetsToStorage(presets);
  renderPresetChips();
}

function renderPresetChips() {
  const container = document.getElementById('presetChips');
  container.innerHTML = '';
  const presets = loadPresetsFromStorage();
  presets.forEach((p, idx) => {
    const chip = document.createElement('div');
    chip.className = 'preset-chip';
    chip.onclick = () => loadPreset(idx);
    chip.innerHTML = `${p.name}<span class="preset-del" onclick="deletePreset(${idx}, event)">×</span>`;
    container.appendChild(chip);
  });
}
